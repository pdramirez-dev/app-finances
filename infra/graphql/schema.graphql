schema {
  query: Query
  mutation: Mutation
}

enum InvoiceStatus {
  DRAFT
  SENT
  PAID
}

enum AccountType {
  SELF_EMPLOYED
  COMPANY
}

enum MembershipRole {
  OWNER
  ADMIN
  MEMBER
}

enum MembershipStatus {
  ACTIVE
  SUSPENDED
}

type Query {
  getInvoice(invoiceId: ID!): Invoice
  getInvoiceByNumber(invoiceNumber: Int!): Invoice
  listInvoices(status: InvoiceStatus, limit: Int, nextToken: String): InvoiceConnection!
  getAccount: Account
  listClients(limit: Int, nextToken: String): ClientConnection!
  getClient(clientId: ID!): Client
  getBankAccount(bankAccountId: ID!): BankAccount
  getMyMembership: UserMembership!
}

type Mutation {
  putInvoice(input: PutInvoiceInput!): Invoice!
  putInvoiceSection(input: PutInvoiceSectionInput!): InvoiceSection!
  putInvoiceLineItem(input: PutInvoiceLineItemInput!): InvoiceLineItem!
  deleteInvoiceSection(invoiceId: ID!, sectionId: ID!): Boolean!
  deleteInvoiceLineItem(sectionId: ID!, lineItemId: ID!): Boolean!
  updateInvoiceStatus(invoiceId: ID!, status: InvoiceStatus!): Invoice!
  deleteInvoice(invoiceId: ID!): Boolean!
  requestInvoicePdf(invoiceId: ID!): PdfRequestResult!
  putAccount(input: PutAccountInput!): Account!
  putClient(input: PutClientInput!): Client!
  deleteClient(clientId: ID!): Boolean!
  putBankAccount(input: PutBankAccountInput!): BankAccount!
}

type InvoiceConnection {
  items: [Invoice!]!
  nextToken: String
}

type ClientConnection {
  items: [Client!]!
  nextToken: String
}

type Invoice {
  invoiceId: ID!
  accountId: ID!
  clientId: ID
  invoiceNumber: Int!
  date: AWSDate!
  weekNumber: Int!
  billToName: String!
  billToAddress: String!
  project: String!
  currency: String!
  notes: String
  grandTotal: Float!
  status: InvoiceStatus!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
  sections: [InvoiceSection!]!
}

type InvoiceSection {
  invoiceId: ID!
  sectionId: ID!
  title: String!
  position: Int!
  total: Float!
  lineItems: [InvoiceLineItem!]!
}

type InvoiceLineItem {
  sectionId: ID!
  lineItemId: ID!
  description: String!
  quantity: Float!
  amount: Float!
  position: Int!
}

type PdfRequestResult {
  accepted: Boolean!
  invoiceId: ID!
  message: String!
}

type Account {
  accountId: ID!
  type: AccountType!
  displayName: String!
  legalName: String
  taxId: String
  email: AWSEmail
  phone: AWSPhone
  address: String
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type Client {
  accountId: ID!
  clientId: ID!
  name: String!
  email: AWSEmail
  phone: AWSPhone
  address: String
  taxId: String
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type BankAccount {
  accountId: ID!
  bankAccountId: ID!
  beneficiaryName: String!
  bankName: String!
  accountNumberMasked: String
  routingNumberMasked: String
  ibanMasked: String
  swiftCode: String
  currency: String!
  country: String
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type UserMembership {
  accountId: ID!
  userId: ID!
  role: MembershipRole!
  status: MembershipStatus!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

input PutInvoiceInput {
  invoiceId: ID
  clientId: ID
  invoiceNumber: Int
  date: AWSDate!
  weekNumber: Int!
  billToName: String!
  billToAddress: String!
  project: String!
  currency: String
  notes: String
  grandTotal: Float!
  status: InvoiceStatus
  createdAt: AWSDateTime
}

input PutInvoiceSectionInput {
  invoiceId: ID!
  sectionId: ID
  title: String!
  position: Int!
  total: Float!
}

input PutInvoiceLineItemInput {
  sectionId: ID!
  lineItemId: ID
  description: String!
  quantity: Float!
  amount: Float!
  position: Int!
}

input PutAccountInput {
  type: AccountType!
  displayName: String!
  legalName: String
  taxId: String
  email: AWSEmail
  phone: AWSPhone
  address: String
}

input PutClientInput {
  clientId: ID
  name: String!
  email: AWSEmail
  phone: AWSPhone
  address: String
  taxId: String
}

input PutBankAccountInput {
  bankAccountId: ID
  beneficiaryName: String!
  bankName: String!
  accountNumberMasked: String
  routingNumberMasked: String
  ibanMasked: String
  swiftCode: String
  currency: String!
  country: String
}
